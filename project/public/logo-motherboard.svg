<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="BoardLab">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed" />
      <stop offset="1" stop-color="#22c55e" />
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="208" height="208" rx="44" fill="#0b1220" />
  <rect x="40" y="40" width="176" height="176" rx="34" fill="url(#g)" opacity="0.16" />

  <!-- Motherboard outline -->
  <rect x="62" y="66" width="132" height="124" rx="18" fill="none" stroke="#e5e7eb" stroke-width="10" />

  <!-- CPU socket -->
  <rect x="86" y="92" width="56" height="56" rx="10" fill="none" stroke="#e5e7eb" stroke-width="10" />
  <rect x="100" y="106" width="28" height="28" rx="6" fill="#e5e7eb" opacity="0.9" />

  <!-- PCIe slot -->
  <rect x="86" y="164" width="108" height="14" rx="7" fill="#e5e7eb" opacity="0.92" />

  <!-- VRM dots -->
  <circle cx="162" cy="104" r="6" fill="#e5e7eb" />
  <circle cx="180" cy="104" r="6" fill="#e5e7eb" />
  <circle cx="162" cy="122" r="6" fill="#e5e7eb" />
  <circle cx="180" cy="122" r="6" fill="#e5e7eb" />
</svg>
